name: Publish complete Two Six candidate vision

on:
  pull_request:
    branches:
      - main
    paths:
      - "bootstrap/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: two-six-publication
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out canonical main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decode candidate archive
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/source.part* | base64 --decode > /tmp/two-six-source.tar.gz
          test -s /tmp/two-six-source.tar.gz

      - name: Validate candidate archive
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf /tmp/two-six-source.tar.gz > /tmp/two-six-manifest.txt
          test -s /tmp/two-six-manifest.txt

      - name: Extract candidate archive
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/two-six-source.tar.gz -C .
          test -s index.html
          test -s styles.css
          test -s resume.html
          test -s cover-letter.html

      - name: Remove publication staging
        shell: bash
        run: |
          set -euo pipefail
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml
          rm -f .github/workflows/documents.yml
          rm -f scripts/verify-pdfs.py

      - name: Commit complete campaign to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish Two Six candidate vision"
          git push origin main

      - name: Upload published tree for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
