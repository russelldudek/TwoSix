name: Publish complete Two Six candidate vision

on:
  pull_request:
    branches:
      - main
    paths:
      - "bootstrap/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: two-six-publication
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out canonical main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Expand verified candidate campaign
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/source.part* | base64 --decode > /tmp/two-six-source.tar.gz
          tar -xzf /tmp/two-six-source.tar.gz -C .
          mkdir -p assets/brand
          curl --fail --location --retry 3 \
            "https://twosixtech.com/wp-content/themes/twosixtech25/assets/sentr-home/Two-Six-Tech-Footer-Logo%402x.png" \
            --output assets/brand/two-six-logo-white.png
          test -s assets/brand/two-six-logo-white.png
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml
          rm -f .github/workflows/documents.yml
          rm -f scripts/verify-pdfs.py
          if grep -RilE 'role[[:space:]_-]*forge' . \
            --exclude-dir=.git \
            --exclude='*.pdf'; then
            echo "Candidate-facing confidentiality scan failed." >&2
            exit 1
          fi

      - name: Commit complete campaign to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish Two Six candidate vision"
          git push origin main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload exact published tree
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
