name: Two Six campaign quality

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run source regression audit
        id: source-audit
        continue-on-error: true
        run: node qa/correction-regression.mjs 2>&1 | tee source-audit.log
      - name: Upload source audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-audit
          path: source-audit.log
      - name: Stop on source audit failure
        if: steps.source-audit.outcome == 'failure'
        run: exit 1
      - name: Install audit and document dependencies
        run: |
          npm install --no-save playwright@1.55.0 pdfjs-dist@4.10.38 pdf-lib@1.17.1
          npx playwright install --with-deps chromium
      - name: Run rendered browser audit
        id: browser-audit
        continue-on-error: true
        run: node qa/browser-audit.mjs 2>&1 | tee browser-audit.log
      - name: Upload rendered browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit
          path: browser-audit.log
      - name: Upload transfer pane visual review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transfer-pane-review
          path: qa-artifacts
          if-no-files-found: error
      - name: Stop on rendered browser failure
        if: steps.browser-audit.outcome == 'failure'
        run: exit 1
      - name: Generate printable PDFs
        run: node scripts/build-pdfs.mjs
      - name: Upload entry plan for visual review
        uses: actions/upload-artifact@v4
        with:
          name: five-page-entry-plan
          path: docs/Russell-Dudek-Two-Six-120-Day-Entry-Plan.pdf
      - name: Run generated PDF audit
        id: pdf-audit
        continue-on-error: true
        run: node qa/pdf-audit.mjs 2>&1 | tee pdf-audit.log
      - name: Upload generated PDF diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-audit
          path: pdf-audit.log
      - name: Stop on generated PDF failure
        if: steps.pdf-audit.outcome == 'failure'
        run: exit 1
